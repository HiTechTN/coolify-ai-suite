name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.2.0)'
        required: true
        default: 'v2.2.0'

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" "main..HEAD" 2>/dev/null || echo "- Initial release v$VERSION")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Release Artifact
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          tar -czf "coolify-ai-suite-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.opencode' \
            --exclude='.qwen' \
            --exclude='node_modules' \
            --exclude='*.db' \
            --exclude='*.db-*' \
            --exclude='Kimi_Agent*' \
            --exclude='insrtall*' \
            -C .. "Coolify AI Suite"

      - name: Upload Release Artifact
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          gh release upload "$VERSION" "coolify-ai-suite-${VERSION}.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}